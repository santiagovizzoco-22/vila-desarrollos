<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portal Inversor — VILA</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Raleway:wght@100;200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --charcoal: #2a2825;
      --warm-white: #faf8f5;
      --off-white: #f2efe9;
      --gold: #c9a96e;
      --gold-light: rgba(201,169,110,0.15);
      --green: #4a7c59;
      --green-light: rgba(74,124,89,0.1);
    }
    body { background:var(--warm-white); color:var(--charcoal); font-family:Raleway,sans-serif; min-height:100vh; }

    header {
      background:var(--warm-white);
      border-bottom:1px solid rgba(42,40,37,0.08);
      padding:1.1rem clamp(1.5rem,5vw,4rem);
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100;
    }
    .brand { font-family:"Cormorant Garamond",serif; font-weight:300; font-size:1.3rem; letter-spacing:0.15em; }
    .brand-sub { font-size:0.56rem; letter-spacing:0.35em; text-transform:uppercase; color:rgba(42,40,37,0.38); display:block; margin-top:0.15rem; font-family:Raleway,sans-serif; font-weight:200; }
    .header-right { display:flex; align-items:center; gap:1rem; }
    .user-name { font-weight:200; font-size:0.66rem; letter-spacing:0.12em; color:rgba(42,40,37,0.5); }
    .btn-sm { background:none; border:1px solid rgba(42,40,37,0.18); font-family:Raleway,sans-serif; font-weight:200; font-size:0.54rem; letter-spacing:0.28em; text-transform:uppercase; color:rgba(42,40,37,0.45); padding:0.38rem 0.9rem; cursor:pointer; transition:all 0.2s; }
    .btn-sm:hover { border-color:var(--charcoal); color:var(--charcoal); }

    main { max-width:920px; margin:0 auto; padding:2.5rem clamp(1.2rem,5vw,4rem); }

    /* Selector de proyecto (si tiene más de uno) */
    .proyecto-tabs { display:flex; gap:0.35rem; margin-bottom:1.5rem; flex-wrap:wrap; }
    .proyecto-tab { background:none; border:1px solid rgba(42,40,37,0.12); font-family:Raleway,sans-serif; font-weight:200; font-size:0.54rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(42,40,37,0.4); padding:0.38rem 0.85rem; cursor:pointer; transition:all 0.2s; }
    .proyecto-tab:hover { border-color:rgba(42,40,37,0.3); color:var(--charcoal); }
    .proyecto-tab.active { background:var(--charcoal); border-color:var(--charcoal); color:var(--warm-white); }

    .welcome { margin-bottom:2rem; }
    .eyebrow { font-size:0.56rem; letter-spacing:0.42em; text-transform:uppercase; color:var(--gold); margin-bottom:0.5rem; font-weight:200; }
    .page-title { font-family:"Cormorant Garamond",serif; font-weight:300; font-size:clamp(1.5rem,3vw,2.1rem); margin-bottom:0.25rem; }
    .page-sub { font-weight:200; font-size:0.68rem; letter-spacing:0.1em; color:rgba(42,40,37,0.42); }
    .rule { width:30px; height:1px; background:var(--gold); margin-top:0.8rem; }

    .period-bar { display:flex; gap:0.35rem; margin-bottom:2rem; flex-wrap:wrap; }
    .period-btn { background:none; border:1px solid rgba(42,40,37,0.12); font-family:Raleway,sans-serif; font-weight:200; font-size:0.54rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(42,40,37,0.4); padding:0.38rem 0.85rem; cursor:pointer; transition:all 0.2s; }
    .period-btn:hover { border-color:rgba(42,40,37,0.3); color:var(--charcoal); }
    .period-btn.active { background:var(--charcoal); border-color:var(--charcoal); color:var(--warm-white); }

    .stats { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:0.8rem; margin-bottom:1.8rem; }
    .stat { background:white; border:1px solid rgba(42,40,37,0.08); padding:1.2rem; }
    .stat-label { font-weight:200; font-size:0.5rem; letter-spacing:0.28em; text-transform:uppercase; color:rgba(42,40,37,0.38); margin-bottom:0.4rem; }
    .stat-val { font-family:"Cormorant Garamond",serif; font-weight:300; font-size:1.6rem; color:var(--charcoal); }
    .stat-sub { font-weight:200; font-size:0.58rem; color:rgba(42,40,37,0.32); margin-top:0.18rem; }

    .hitos-wrap { background:white; border:1px solid rgba(42,40,37,0.08); padding:1.8rem; margin-bottom:1rem; }
    .block-title { font-family:"Cormorant Garamond",serif; font-weight:300; font-size:1.05rem; letter-spacing:0.1em; color:var(--charcoal); margin-bottom:1.5rem; padding-bottom:0.8rem; border-bottom:1px solid rgba(42,40,37,0.07); display:flex; justify-content:space-between; align-items:center; }
    .block-badge { font-family:Raleway,sans-serif; font-weight:200; font-size:0.5rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--gold); border:1px solid rgba(201,169,110,0.35); padding:0.22rem 0.55rem; }

    .hitos-track { display:flex; align-items:flex-start; position:relative; padding-bottom:0.5rem; overflow-x:auto; gap:0; }
    .hito { display:flex; flex-direction:column; align-items:center; flex:1; min-width:100px; position:relative; }
    .hito:not(:last-child)::after { content:""; position:absolute; top:14px; left:50%; width:100%; height:2px; z-index:0; }
    .hito.done:not(:last-child)::after { background:var(--green); }
    .hito.active:not(:last-child)::after { background:linear-gradient(to right, var(--gold) 40%, rgba(42,40,37,0.1) 100%); }
    .hito.pending:not(:last-child)::after { background:rgba(42,40,37,0.1); }
    .hito-dot { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.65rem; position:relative; z-index:1; flex-shrink:0; }
    .hito.done .hito-dot { background:var(--green); color:white; }
    .hito.active .hito-dot { background:var(--gold); color:white; box-shadow:0 0 0 4px rgba(201,169,110,0.2); }
    .hito.pending .hito-dot { background:white; border:2px solid rgba(42,40,37,0.15); color:rgba(42,40,37,0.3); }
    .hito-label { margin-top:0.6rem; font-weight:200; font-size:0.58rem; letter-spacing:0.1em; text-align:center; line-height:1.4; color:rgba(42,40,37,0.5); max-width:90px; }
    .hito.done .hito-label { color:var(--green); }
    .hito.active .hito-label { color:var(--charcoal); font-weight:300; }
    .hito-date { font-size:0.52rem; letter-spacing:0.1em; color:rgba(42,40,37,0.3); margin-top:0.2rem; text-align:center; }
    .hito.active .hito-date { color:var(--gold); }

    .progress-wrap { background:white; border:1px solid rgba(42,40,37,0.08); padding:1.5rem; margin-bottom:1rem; }
    .progress-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:0.6rem; }
    .progress-name { font-family:"Cormorant Garamond",serif; font-weight:300; font-size:1rem; letter-spacing:0.08em; }
    .progress-pct { font-family:"Cormorant Garamond",serif; font-weight:300; font-size:1.3rem; color:var(--gold); }
    .progress-bg { height:2px; background:rgba(42,40,37,0.08); width:100%; margin-bottom:0.35rem; }
    .progress-fill { height:2px; background:var(--gold); }
    .progress-sub { font-weight:200; font-size:0.54rem; letter-spacing:0.18em; text-transform:uppercase; color:rgba(42,40,37,0.32); }

    .rubros-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.8rem; }
    .rubro-group { background:white; border:1px solid rgba(42,40,37,0.08); padding:1.2rem; }
    .rubro-group-title { font-weight:300; font-size:0.72rem; letter-spacing:0.18em; text-transform:uppercase; color:rgba(42,40,37,0.45); margin-bottom:0.8rem; padding-bottom:0.6rem; border-bottom:1px solid rgba(42,40,37,0.06); display:flex; justify-content:space-between; }
    .rubro-pct { font-family:"Cormorant Garamond",serif; font-weight:300; font-size:1rem; color:var(--gold); }
    .rubro-item-row { display:flex; align-items:center; justify-content:space-between; padding:0.4rem 0; border-bottom:1px solid rgba(42,40,37,0.04); }
    .rubro-item-row:last-child { border-bottom:none; }
    .rubro-item-name { font-weight:200; font-size:0.72rem; color:rgba(42,40,37,0.7); }
    .badge { font-weight:200; font-size:0.48rem; letter-spacing:0.18em; text-transform:uppercase; padding:0.18rem 0.45rem; }
    .badge-done { color:var(--green); background:var(--green-light); border:1px solid rgba(74,124,89,0.18); }
    .badge-wip  { color:#b8840a; background:var(--gold-light); border:1px solid rgba(201,169,110,0.3); }
    .badge-pend { color:rgba(42,40,37,0.3); background:rgba(42,40,37,0.04); border:1px solid rgba(42,40,37,0.1); }

    .block { background:white; border:1px solid rgba(42,40,37,0.08); padding:1.8rem; margin-bottom:1rem; }
    .bullet-list { display:flex; flex-direction:column; gap:0.55rem; }
    .bullet-item { display:flex; gap:0.8rem; font-weight:200; font-size:0.78rem; line-height:1.75; color:rgba(42,40,37,0.68); }
    .bullet-dot { width:4px; height:4px; border-radius:50%; background:var(--gold); flex-shrink:0; margin-top:0.6rem; }
    strong { font-weight:300; }

    .director-msg { background:var(--off-white); border-left:2px solid var(--gold); padding:1.4rem 1.6rem; margin-bottom:1rem; }
    .director-quote { font-family:"Cormorant Garamond",serif; font-weight:300; font-style:italic; font-size:0.98rem; line-height:1.9; color:var(--charcoal); margin-bottom:0.7rem; }
    .director-name { font-weight:200; font-size:0.58rem; letter-spacing:0.25em; text-transform:uppercase; color:rgba(42,40,37,0.42); }

    .doc-list { display:flex; flex-direction:column; gap:0.55rem; }
    .doc-item { display:flex; align-items:center; justify-content:space-between; padding:0.85rem 1rem; border:1px solid rgba(42,40,37,0.08); text-decoration:none; color:var(--charcoal); transition:border-color 0.2s; }
    .doc-item:hover { border-color:var(--gold); }
    .doc-icon { font-size:1rem; margin-right:0.8rem; flex-shrink:0; }
    .doc-info { flex:1; }
    .doc-name { font-weight:300; font-size:0.78rem; }
    .doc-type { font-weight:200; font-size:0.54rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(42,40,37,0.38); margin-top:0.12rem; }
    .doc-arrow { color:var(--gold); }

    /* Loading skeleton */
    .skeleton { background:rgba(42,40,37,0.06); border-radius:2px; animation:pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .loading-msg { font-family:"Cormorant Garamond",serif; font-weight:300; font-style:italic; font-size:1rem; color:rgba(42,40,37,0.3); padding:3rem; text-align:center; }

    /* Sin informe */
    .no-informe { background:white; border:1px solid rgba(42,40,37,0.08); padding:3rem; text-align:center; }
    .no-informe p { font-family:"Cormorant Garamond",serif; font-weight:300; font-style:italic; font-size:1rem; color:rgba(42,40,37,0.35); }

    @media(max-width:640px) {
      .stats { grid-template-columns:1fr 1fr; }
      .rubros-grid { grid-template-columns:1fr; }
      .hito-label { font-size:0.5rem; max-width:70px; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    VILA
    <span class="brand-sub">Portal de Inversores</span>
  </div>
  <div class="header-right">
    <span class="user-name" id="userName">—</span>
    <button class="btn-sm" id="btnSalir">Salir</button>
  </div>
</header>

<main id="mainContent">
  <div class="loading-msg">Cargando tu portal...</div>
</main>

<script>
  // Carousel — se inicializa dinámicamente después de cargar fotos
  let photoIdx = 0;
  window.slidePhoto = function(dir) {
    const track = document.getElementById('photoTrack');
    if (!track) return;
    const cards = track.querySelectorAll('.photo-slide');
    const total = cards.length;
    if (!total) return;
    photoIdx = (photoIdx + dir + total) % total;
    updateCarousel(cards);
  };
  window.goToPhoto = function(idx) {
    const track = document.getElementById('photoTrack');
    if (!track) return;
    const cards = track.querySelectorAll('.photo-slide');
    photoIdx = idx;
    updateCarousel(cards);
  };
  function updateCarousel(cards) {
    const total = cards.length;
    cards[photoIdx].scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
    document.querySelectorAll('.pdot').forEach((d,i) => {
      d.style.background = i === photoIdx ? '#c9a96e' : 'rgba(42,40,37,0.2)';
    });
    const counter = document.getElementById('photoCounter');
    if (counter) counter.textContent = (photoIdx + 1) + ' / ' + total;
  }
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore, collection, doc,
    getDocs, getDoc, query, where, orderBy, limit
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyA2MX85SeAQH8OQr1HBSAOOifPmcH7B0FQ",
    authDomain: "vila-desarrollos.com",
    projectId: "vila-desarrollos"
  });
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Estado global del portal
  let inversor = null;
  let participaciones = [];
  let proyectoActual = null;
  let informesDelProyecto = []; // todos los periodos disponibles

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = '/'; return; }
    document.getElementById('userName').textContent = user.displayName || user.email;
    await initPortal(user.email.toLowerCase());
  });

  document.getElementById('btnSalir').addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = '/';
  });

  // ══════════════════════════════════════════
  //  INIT
  // ══════════════════════════════════════════
  async function initPortal(email) {
    // Mostrar el email que está buscando (para debug)
    console.log('Buscando inversor con email:', email);
    // 1. Buscar inversor por email
    const invSnap = await getDocs(query(collection(db, 'inversores'), where('email', '==', email)));
    if (invSnap.empty) {
      document.getElementById('mainContent').innerHTML = `
        <div class="loading-msg" style="padding-top:5rem;">
          <p style="margin-bottom:0.5rem;">No encontramos tu cuenta de inversor.</p>
          <p style="font-size:0.72rem;opacity:0.6;margin-bottom:0.3rem;">Email detectado: <strong>${email}</strong></p>
          <p style="font-size:0.72rem;opacity:0.6;">Comunicate con VILA para que activen tu acceso.</p>
        </div>`;
      return;
    }
    inversor = { id: invSnap.docs[0].id, ...invSnap.docs[0].data() };

    // 2. Buscar participaciones del inversor
    const partSnap = await getDocs(query(collection(db, 'participaciones'), where('inversorId', '==', inversor.id)));
    participaciones = partSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    if (participaciones.length === 0) {
      document.getElementById('mainContent').innerHTML = `
        <div class="loading-msg" style="padding-top:5rem;">
          <p>Aún no tenés proyectos asignados.</p>
          <p style="font-size:0.72rem;opacity:0.6;">Comunicate con VILA para más información.</p>
        </div>`;
      return;
    }

    // 3. Mostrar el primer proyecto por defecto
    proyectoActual = participaciones[0].proyecto;
    await cargarProyecto(proyectoActual);
  }

  // ══════════════════════════════════════════
  //  CARGAR PROYECTO
  // ══════════════════════════════════════════
  async function cargarProyecto(proyecto) {
    proyectoActual = proyecto;

    // Traer todos los informes publicados de este proyecto
    const infSnap = await getDocs(query(
      collection(db, 'informes'),
      where('proyecto', '==', proyecto),
      where('estado', '==', 'publicado'),
      orderBy('periodo', 'desc')
    ));
    informesDelProyecto = infSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Traer documentos visibles para este inversor
    const [docsParaTodos, docsParaMi] = await Promise.all([
      getDocs(query(collection(db, 'documentos'), where('visibleId', '==', 'todos'))),
      getDocs(query(collection(db, 'documentos'), where('visibleId', '==', inversor.id)))
    ]);
    const documentos = [
      ...docsParaTodos.docs.map(d => ({ id: d.id, ...d.data() })),
      ...docsParaMi.docs.map(d => ({ id: d.id, ...d.data() }))
    ];

    // Encontrar la participación del proyecto actual
    const part = participaciones.find(p => p.proyecto === proyecto) || participaciones[0];

    // Renderizar
    renderPortal(part, informesDelProyecto, documentos);
  }

  // ══════════════════════════════════════════
  //  RENDER COMPLETO
  // ══════════════════════════════════════════
  function renderPortal(part, informes, documentos) {
    const informe = informes[0] || null; // el más reciente
    const main = document.getElementById('mainContent');

    // Tabs de proyectos si tiene más de uno
    const tabsHTML = participaciones.length > 1 ? `
      <div class="proyecto-tabs">
        ${participaciones.map(p => `
          <button class="proyecto-tab ${p.proyecto === proyectoActual ? 'active' : ''}"
            onclick="window._cambiarProyecto('${p.proyecto}')">
            ${p.proyecto}
          </button>`).join('')}
      </div>` : '';

    // Header del informe
    const periodoLabel = informe ? formatPeriodo(informe.periodo) : '—';
    const ubicacionProyecto = informe ? '' : '';

    main.innerHTML = `
      ${tabsHTML}

      <div class="welcome">
        <div class="eyebrow">${informe ? 'Informe de Avance — ' + periodoLabel : 'Portal de Inversores'}</div>
        <div class="page-title" id="pageTitle">${part.proyecto}</div>
        <div class="page-sub" id="pageSub">${informe ? 'Actualizado: ' + periodoLabel : 'Sin informes publicados aún'}</div>
        <div class="rule"></div>
      </div>

      <!-- Selector de período -->
      ${informes.length > 0 ? `
      <div class="period-bar" id="periodBar">
        ${informes.map((inf, i) => `
          <button class="period-btn ${i === 0 ? 'active' : ''}"
            data-periodo="${inf.periodo}"
            onclick="window._cargarPeriodo('${inf.id}', this)">
            ${formatPeriodoCorto(inf.periodo)}
          </button>`).join('')}
      </div>` : ''}

      <!-- Stats -->
      <div class="stats" id="statsBlock">
        ${renderStats(part, informe)}
      </div>

      <!-- Cronograma de inversión -->
      ${renderCronograma(part)}

      <!-- Fotos -->
      ${informe && informe.fotos && informe.fotos.length > 0 ? renderFotos(informe) : ''}

      <!-- Hitos -->
      ${informe ? renderHitos(informe) : ''}

      <!-- Barra de avance -->
      ${informe ? renderProgreso(part, informe) : ''}

      <!-- Rubros -->
      ${informe && informe.rubros ? renderRubros(informe) : ''}

      <!-- Compras -->
      ${informe && informe.compras ? `
      <div class="block">
        <div class="block-title">B. Compras del Período</div>
        <div class="bullet-list">
          ${informe.compras.split('\n').filter(Boolean).map(l => `
            <div class="bullet-item"><div class="bullet-dot"></div><div>${l}</div></div>`).join('')}
        </div>
      </div>` : ''}

      <!-- Próximos pasos -->
      ${informe && informe.proximos ? `
      <div class="block">
        <div class="block-title">C. Próximos Pasos <span class="block-badge">${formatPeriodoCorto(informe.periodo)}</span></div>
        <div class="bullet-list">
          ${informe.proximos.split('\n').filter(Boolean).map(l => `
            <div class="bullet-item"><div class="bullet-dot"></div><div>${l}</div></div>`).join('')}
        </div>
      </div>` : ''}

      <!-- Mensaje director -->
      ${informe && informe.mensaje ? `
      <div class="director-msg">
        <div class="director-quote">"${informe.mensaje}"</div>
        <div class="director-name">${informe.director || 'Director de Obra'} · Director de Obra</div>
      </div>` : ''}

      <!-- Sin informe -->
      ${!informe ? `
      <div class="no-informe">
        <p>El primer informe de este proyecto estará disponible próximamente.</p>
      </div>` : ''}

      <!-- Documentos -->
      ${renderDocumentos(documentos)}
    `;

    // Reasignar carousel listeners
    const track = document.getElementById('photoTrack');
    if (track) {
      photoIdx = 0;
      track.addEventListener('scroll', () => {
        const cards = track.querySelectorAll('.photo-slide');
        let closest = 0, minDist = Infinity;
        cards.forEach((c, i) => {
          const dist = Math.abs(c.getBoundingClientRect().left - track.getBoundingClientRect().left);
          if (dist < minDist) { minDist = dist; closest = i; }
        });
        if (closest !== photoIdx) {
          photoIdx = closest;
          document.querySelectorAll('.pdot').forEach((d,i) => {
            d.style.background = i === photoIdx ? '#c9a96e' : 'rgba(42,40,37,0.2)';
          });
          const counter = document.getElementById('photoCounter');
          if (counter) counter.textContent = (photoIdx+1)+' / '+cards.length;
        }
      }, { passive: true });
    }
  }

  // ── Cargar período específico ──
  window._cargarPeriodo = async function(informeId, btn) {
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const snap = await getDoc(doc(db, 'informes', informeId));
    if (!snap.exists()) return;
    const informe = { id: snap.id, ...snap.data() };
    const part = participaciones.find(p => p.proyecto === proyectoActual) || participaciones[0];

    // Actualizar solo las secciones dinámicas sin re-renderizar todo
    document.getElementById('pageTitle').textContent = part.proyecto;
    document.getElementById('pageSub').textContent = 'Actualizado: ' + formatPeriodo(informe.periodo);
    document.querySelector('.eyebrow').textContent = 'Informe de Avance — ' + formatPeriodo(informe.periodo);
    document.getElementById('statsBlock').innerHTML = renderStats(part, informe);

    // Re-renderizar contenido del informe
    const oldContent = document.getElementById('informeContent');
    if (oldContent) oldContent.remove();
    const container = document.createElement('div');
    container.id = 'informeContent';
    container.innerHTML = `
      ${informe.fotos && informe.fotos.length > 0 ? renderFotos(informe) : ''}
      ${renderHitos(informe)}
      ${renderProgreso(part, informe)}
      ${informe.rubros ? renderRubros(informe) : ''}
      ${informe.compras ? `
        <div class="block">
          <div class="block-title">B. Compras del Período</div>
          <div class="bullet-list">
            ${informe.compras.split('\n').filter(Boolean).map(l=>`<div class="bullet-item"><div class="bullet-dot"></div><div>${l}</div></div>`).join('')}
          </div>
        </div>` : ''}
      ${informe.proximos ? `
        <div class="block">
          <div class="block-title">C. Próximos Pasos <span class="block-badge">${formatPeriodoCorto(informe.periodo)}</span></div>
          <div class="bullet-list">
            ${informe.proximos.split('\n').filter(Boolean).map(l=>`<div class="bullet-item"><div class="bullet-dot"></div><div>${l}</div></div>`).join('')}
          </div>
        </div>` : ''}
      ${informe.mensaje ? `
        <div class="director-msg">
          <div class="director-quote">"${informe.mensaje}"</div>
          <div class="director-name">${informe.director||'Director de Obra'} · Director de Obra</div>
        </div>` : ''}
    `;
    // Insertar antes de documentos
    const docsEl = document.getElementById('documentosBlock');
    if (docsEl) docsEl.before(container);
    else document.getElementById('mainContent').appendChild(container);
  };

  // ── Cambiar proyecto ──
  window._cambiarProyecto = async function(proyecto) {
    document.querySelectorAll('.proyecto-tab').forEach(t => {
      t.classList.toggle('active', t.textContent.trim() === proyecto);
    });
    await cargarProyecto(proyecto);
  };

  // ══════════════════════════════════════════
  //  RENDER HELPERS
  // ══════════════════════════════════════════
  function renderStats(part, informe) {
    const cap = part.capital ? `USD ${Number(part.capital).toLocaleString('es-AR')}` : '—';
    const pct = part.participacion ? `${part.participacion}%` : '—';
    const avance = informe ? `${informe.avance || 0}%` : '—';
    const etapa = informe ? (informe.etapa || '—') : '—';
    return `
      <div class="stat">
        <div class="stat-label">Proyecto</div>
        <div class="stat-val" style="font-size:1rem;margin-top:0.3rem;">${part.proyecto}</div>
        <div class="stat-sub">${etapa}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Capital invertido</div>
        <div class="stat-val" style="font-size:1.2rem;">${cap}</div>
        <div class="stat-sub">Participación: ${pct}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Avance acumulado</div>
        <div class="stat-val">${avance}</div>
        <div class="stat-sub">${informe ? formatPeriodo(informe.periodo) : '—'}</div>
      </div>`;
  }

  function renderCronograma(part) {
    if (!part.desembolsos || part.desembolsos.length === 0) return '';
    const total = Number(part.capital) || 0;
    const realizados = part.desembolsos.filter(d => d.estado === 'Realizado');
    const aportado = realizados.reduce((s, d) => s + Number(d.monto||0), 0);
    const proximo = part.desembolsos.find(d => d.estado === 'Próximo');
    const pendienteTotal = total - aportado;
    const pctAportado = total > 0 ? ((aportado / total) * 100).toFixed(1) : 0;

    return `
    <div class="block" style="margin-bottom:1rem;">
      <div class="block-title">Cronograma de Inversión</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:0.8rem;margin-bottom:1.5rem;">
        <div style="background:var(--off-white);padding:1.2rem;border:1px solid rgba(42,40,37,0.06);">
          <div style="font-weight:200;font-size:0.5rem;letter-spacing:0.28em;text-transform:uppercase;color:rgba(42,40,37,0.38);margin-bottom:0.4rem;">Capital comprometido</div>
          <div style="font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.6rem;">USD ${total.toLocaleString('es-AR')}</div>
        </div>
        <div style="background:var(--off-white);padding:1.2rem;border:1px solid rgba(42,40,37,0.06);">
          <div style="font-weight:200;font-size:0.5rem;letter-spacing:0.28em;text-transform:uppercase;color:rgba(42,40,37,0.38);margin-bottom:0.4rem;">Aportado a la fecha</div>
          <div style="font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.6rem;color:var(--green);">USD ${aportado.toLocaleString('es-AR')}</div>
        </div>
        ${proximo ? `
        <div style="background:var(--off-white);padding:1.2rem;border:1px solid rgba(42,40,37,0.06);">
          <div style="font-weight:200;font-size:0.5rem;letter-spacing:0.28em;text-transform:uppercase;color:rgba(42,40,37,0.38);margin-bottom:0.4rem;">Próximo desembolso</div>
          <div style="font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.4rem;color:var(--gold);">USD ${Number(proximo.monto||0).toLocaleString('es-AR')}</div>
          <div style="font-weight:200;font-size:0.58rem;color:rgba(42,40,37,0.35);margin-top:0.2rem;">${proximo.fecha || ''}</div>
        </div>` : ''}
        <div style="background:var(--off-white);padding:1.2rem;border:1px solid rgba(42,40,37,0.06);">
          <div style="font-weight:200;font-size:0.5rem;letter-spacing:0.28em;text-transform:uppercase;color:rgba(42,40,37,0.38);margin-bottom:0.4rem;">Capital pendiente</div>
          <div style="font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.6rem;">USD ${pendienteTotal.toLocaleString('es-AR')}</div>
        </div>
      </div>
      <div style="margin-bottom:1.2rem;">
        <div style="display:flex;justify-content:space-between;margin-bottom:0.4rem;">
          <span style="font-weight:200;font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(42,40,37,0.4);">Capital aportado</span>
          <span style="font-weight:200;font-size:0.58rem;color:rgba(42,40,37,0.4);">${pctAportado}%</span>
        </div>
        <div style="height:3px;background:rgba(42,40,37,0.08);">
          <div style="height:3px;background:var(--green);width:${pctAportado}%;"></div>
        </div>
      </div>
      <div style="font-weight:300;font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(42,40,37,0.4);margin-bottom:0.8rem;">Detalle de desembolsos</div>
      <div style="display:flex;flex-direction:column;gap:0;">
        ${part.desembolsos.map(d => {
          const dotColor = d.estado === 'Realizado' ? 'var(--green)' : d.estado === 'Próximo' ? 'var(--gold)' : 'rgba(42,40,37,0.2)';
          const estadoColor = d.estado === 'Realizado' ? 'var(--green)' : d.estado === 'Próximo' ? 'var(--gold)' : 'rgba(42,40,37,0.3)';
          return `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:0.7rem 0;border-bottom:1px solid rgba(42,40,37,0.06);">
            <div style="display:flex;align-items:center;gap:0.8rem;">
              <div style="width:8px;height:8px;border-radius:50%;background:${dotColor};flex-shrink:0;"></div>
              <div>
                <div style="font-weight:300;font-size:0.78rem;">${d.descripcion || '—'}</div>
                <div style="font-weight:200;font-size:0.6rem;color:rgba(42,40,37,0.4);">${d.fecha || ''}</div>
              </div>
            </div>
            <div style="text-align:right;">
              <div style="font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1rem;">USD ${Number(d.monto||0).toLocaleString('es-AR')}</div>
              <div style="font-weight:200;font-size:0.54rem;color:${estadoColor};">${d.estado}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  function renderFotos(informe) {
    const fotos = informe.fotos || [];
    if (!fotos.length) return '';
    // Convertir links de Drive a links directos de imagen
    const fotoUrls = fotos.map(url => {
      const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (match) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w900`;
      return url;
    });
    return `
    <div class="block" style="margin-bottom:1rem;padding:1.8rem 1.8rem 1.4rem;">
      <div class="block-title">Fotos del Mes <span class="block-badge">${formatPeriodoCorto(informe.periodo)}</span></div>
      <div style="position:relative;">
        <div id="photoTrack" style="display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;scrollbar-width:none;">
          ${fotoUrls.map((url, i) => `
            <div class="photo-slide" style="flex:0 0 auto;width:72%;scroll-snap-align:center;aspect-ratio:16/10;overflow:hidden;background:#e8e4de;">
              <img src="${url}" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy"/>
            </div>`).join('')}
        </div>
        <button onclick="slidePhoto(-1)" style="position:absolute;left:0.5rem;top:50%;transform:translateY(-50%);background:rgba(250,248,245,0.9);border:none;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 6px rgba(0,0,0,0.12);">
          <svg width="10" height="10" viewBox="0 0 10 10"><path d="M7 1L3 5l4 4" stroke="#2a2825" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
        </button>
        <button onclick="slidePhoto(1)" style="position:absolute;right:0.5rem;top:50%;transform:translateY(-50%);background:rgba(250,248,245,0.9);border:none;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 6px rgba(0,0,0,0.12);">
          <svg width="10" height="10" viewBox="0 0 10 10"><path d="M3 1l4 4-4 4" stroke="#2a2825" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div id="photoDots" style="display:flex;justify-content:center;gap:6px;margin-top:1rem;">
        ${fotoUrls.map((_, i) => `<div class="pdot" onclick="goToPhoto(${i})" style="width:5px;height:5px;border-radius:50%;background:${i===0?'#c9a96e':'rgba(42,40,37,0.2)'};cursor:pointer;"></div>`).join('')}
      </div>
      <div id="photoCounter" style="text-align:center;font-family:Raleway,sans-serif;font-weight:200;font-size:0.54rem;letter-spacing:0.3em;color:rgba(42,40,37,0.35);margin-top:0.4rem;">1 / ${fotoUrls.length}</div>
    </div>`;
  }

  function renderHitos(informe) {
    const h = informe.hitos || {};
    const hitosConfig = [
      { key: 'fundacion',      label: 'Fundación Hormigonada' },
      { key: 'estructuraPB',   label: 'Estructura sobre PB' },
      { key: 'estructuraAzotea', label: 'Estructura Azotea' },
      { key: 'obraGris',       label: 'Fin Obra Gris' },
      { key: 'entrega',        label: 'Entrega' }
    ];
    // Determinar estado de cada hito
    let foundActive = false;
    const hitosHTML = hitosConfig.map((hc, idx) => {
      let estado;
      if (h[hc.key]) { estado = 'done'; }
      else if (!foundActive) { estado = 'active'; foundActive = true; }
      else { estado = 'pending'; }
      const dot = estado === 'done' ? '✓' : estado === 'active' ? '▶' : String(idx+1);
      const fecha = estado === 'active' ? 'En curso' : estado === 'done' ? '' : '';
      return `
        <div class="hito ${estado}">
          <div class="hito-dot">${dot}</div>
          <div class="hito-label">${hc.label}</div>
          <div class="hito-date">${fecha}</div>
        </div>`;
    }).join('');
    return `
    <div class="hitos-wrap">
      <div class="block-title">Hitos de Obra <span class="block-badge">${formatPeriodoCorto(informe.periodo)}</span></div>
      <div class="hitos-track">${hitosHTML}</div>
    </div>`;
  }

  function renderProgreso(part, informe) {
    const avance = informe.avance || 0;
    return `
    <div class="progress-wrap" style="margin-bottom:1.8rem;">
      <div class="progress-row">
        <div class="progress-name">${part.proyecto}</div>
        <div class="progress-pct">${avance}%</div>
      </div>
      <div class="progress-bg"><div class="progress-fill" style="width:${Math.min(avance,100)}%"></div></div>
      <div class="progress-sub">Avance acumulado · Etapa: ${informe.etapa || '—'}</div>
    </div>`;
  }

  function renderRubros(informe) {
    const rubros = informe.rubros || {};
    const rubrosDef = [
      { key: 'Trabajos Preliminares', label: 'Trabajos Preliminares', pct: '3%' },
      { key: 'Estructura', label: 'Estructura H°A°', pct: '22%' },
      { key: 'Mampostería', label: 'Mampostería', pct: '11%' },
      { key: 'Sanitaria', label: 'Instalaciones Sanitarias', pct: '7%' },
      { key: 'Eléctrica', label: 'Instalación Eléctrica', pct: '7%' },
      { key: 'Revoques', label: 'Revoques', pct: '9%' },
      { key: 'Carpinterías', label: 'Carpinterías', pct: '8%' },
      { key: 'Terminaciones', label: 'Terminaciones', pct: '10%' }
    ];
    const badgeClass = v => v === 'Concluido' ? 'badge-done' : v === 'En ejecución' ? 'badge-wip' : 'badge-pend';
    return `
    <div class="block" style="margin-bottom:1rem;">
      <div class="block-title">A. Avance de Obra por Rubros</div>
      <div class="rubros-grid">
        ${rubrosDef.map(r => `
          <div class="rubro-group">
            <div class="rubro-group-title">${r.label} <span class="rubro-pct">${r.pct}</span></div>
            <div class="rubro-item-row">
              <span class="rubro-item-name">${r.label}</span>
              <span class="badge ${badgeClass(rubros[r.key] || 'Pendiente')}">${rubros[r.key] || 'Pendiente'}</span>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  function renderDocumentos(documentos) {
    if (!documentos || documentos.length === 0) return '<div id="documentosBlock"></div>';
    return `
    <div class="block" id="documentosBlock">
      <div class="block-title">Documentos</div>
      <div class="doc-list">
        ${documentos.map(d => `
          <a href="${d.link || '#'}" target="_blank" class="doc-item">
            <span class="doc-icon">📄</span>
            <div class="doc-info">
              <div class="doc-name">${d.nombre || '—'}</div>
              <div class="doc-type">${d.tipo || ''} · ${d.proyecto || ''}</div>
            </div>
            <span class="doc-arrow">↓</span>
          </a>`).join('')}
      </div>
    </div>`;
  }

  // ── Helpers de fecha ──
  function formatPeriodo(periodo) {
    if (!periodo) return '—';
    const [y, m] = periodo.split('-');
    const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    return `${meses[parseInt(m)-1]} ${y}`;
  }
  function formatPeriodoCorto(periodo) {
    if (!periodo) return '—';
    const [y, m] = periodo.split('-');
    const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    return `${meses[parseInt(m)-1]} ${y}`;
  }

</script>
</body>
</html>
